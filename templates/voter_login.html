<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter Voting Password - {{ school_name }}</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; text-align: center; padding-top: 100px; }
    form { display: inline-block; background: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #1a3c6e; margin-top: 0; }
    p.subtitle { color: #666; font-size: 14px; margin-top: -10px; }
    input[type=password] { padding: 10px; width: 220px; border: 1px solid #ccc; border-radius: 6px; margin-top: 10px; }
    button { margin-top: 15px; background: #1a3c6e; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .error { color: #b02a2a; margin-top: 10px; }
</style>
</head>
<body>
    <form method="POST">
        <h2>{{ school_name }}</h2>
        <p class="subtitle">Enter the voting password given by your teacher</p>
        <input type="password" name="password" placeholder="Voting password" required><br>
        <button type="submit">Continue</button>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
</body>
</html>
