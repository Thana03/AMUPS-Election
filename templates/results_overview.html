<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Results - {{ school_name }}</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; text-align: center; }
    header { background: #1a3c6e; color: white; padding: 25px 10px; }
    header h1 { margin: 0; font-size: 26px; }
    .section-title { margin-top: 35px; font-size: 20px; color: #1a3c6e; font-weight: bold; }
    .list { max-width: 500px; margin: 15px auto 0; padding: 0 20px; text-align: left; }
    .row {
        display: block; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        padding: 14px 20px; margin-bottom: 12px; text-decoration: none; color: #1a3c6e;
        font-size: 16px; font-weight: bold;
    }
    .row:hover { background: #eef2f8; }
    .logout { display: inline-block; margin: 40px 0; color: #b02a2a; font-size: 14px; }
</style>
</head>
<body>

<header>
    <h1>{{ school_name }}</h1>
    <p>Admin - Results</p>
</header>

<h2 class="section-title">School Leader</h2>
<div class="list">
    <a class="row" href="{{ url_for('results_school_leader') }}">View School Leader Results</a>
</div>

<h2 class="section-title">Class Leader</h2>
<div class="list">
    {% for cls in classes %}
    <a class="row" href="{{ url_for('results_class', class_id=cls.id) }}">{{ cls.name }}</a>
    {% endfor %}
</div>

<a class="logout" href="{{ url_for('admin_logout') }}">Log out</a>

</body>
</html>
