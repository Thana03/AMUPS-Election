<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Leader - {{ school_name }}</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; text-align: center; }
    header { background: #1a3c6e; color: white; padding: 25px 10px; }
    header h1 { margin: 0; font-size: 26px; }
    header p { margin: 5px 0 0; font-size: 16px; opacity: 0.9; }
    .post-heading { margin-top: 35px; font-size: 22px; color: #1a3c6e; font-weight: bold; }
    .back-link { display: inline-block; margin: 10px 0 30px; color: #1a3c6e; text-decoration: none; font-size: 14px; }
    .class-list { max-width: 500px; margin: 0 auto; padding: 0 20px 40px; text-align: left; }
    .class-row {
        display: block; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        padding: 16px 20px; margin-bottom: 14px; text-decoration: none; color: #1a3c6e;
        font-size: 17px; font-weight: bold;
    }
    .class-row:hover { background: #eef2f8; }
</style>
</head>
<body>

<header>
    <h1>{{ school_name }}</h1>
    <p>School Parliament Election</p>
</header>

<h2 class="post-heading">Select Your Class</h2>
<a class="back-link" href="{{ url_for('home') }}">&larr; Back to home</a>

<div class="class-list">
    {% for cls in classes %}
    <a class="class-row" href="{{ url_for('class_leader_vote_page', class_id=cls.id) }}">{{ cls.name }}</a>
    {% endfor %}
</div>

</body>
</html>
