<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Results - {{ school_name }}</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; text-align: center; }
    header { background: #1a3c6e; color: white; padding: 25px 10px; }
    .results { max-width: 500px; margin: 40px auto; text-align: left; }
    .row { background: white; border-radius: 8px; padding: 15px 20px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .row .name { font-weight: bold; color: #1a3c6e; display: flex; justify-content: space-between; }
    .bar-bg { background: #e0e5ec; border-radius: 5px; margin-top: 8px; height: 14px; overflow: hidden; }
    .bar-fill { background: #1a3c6e; height: 100%; }
    .total { margin-top: 20px; font-size: 15px; color: #555; }
    a { color: #1a3c6e; }
    .actions { margin-top: 25px; }
    .reset-link { color: #b02a2a; }
</style>
</head>
<body>

<header>
    <h1>{{ school_name }}</h1>
    <p>Live Results &mdash; {{ page_title }}</p>
</header>

<div class="results">
    {% for r in results %}
    <div class="row">
        <div class="name">
            <span>{{ r.name }}</span>
            <span>{{ r.count }} votes ({{ r.percent }}%)</span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill" style="width: {{ r.percent }}%;"></div>
        </div>
    </div>
    {% endfor %}
    <p class="total">Total votes cast: {{ total }}</p>
</div>

<div class="actions">
    <a href="{{ back_url }}">&larr; Back to all results</a> &nbsp;|&nbsp;
    <a class="reset-link" href="{{ reset_url }}"
       onclick="return confirm('Reset all votes for {{ page_title }}? This cannot be undone.');">Reset votes</a>
</div>

</body>
</html>
